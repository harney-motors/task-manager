<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Brand + favicon -->
    <title>Tickd</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#185FA5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14120E" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="Tickd" />

    <!-- No-flash theme init. Runs synchronously before React mounts so
         the html data-theme is set before any CSS resolves. Also wires
         a permanent matchMedia listener so 'system' mode keeps tracking
         OS theme changes regardless of which view is mounted in React.
         The hook in src/lib/useTheme.js handles the in-app picker. -->
    <script>
      (function () {
        function compute() {
          try {
            var stored = localStorage.getItem('tickd-theme') || 'system'
            if (stored === 'light' || stored === 'dark') return stored
            return window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          } catch (e) {
            return 'light'
          }
        }
        function apply() {
          document.documentElement.setAttribute('data-theme', compute())
        }
        apply()
        if (window.matchMedia) {
          window
            .matchMedia('(prefers-color-scheme: dark)')
            .addEventListener('change', apply)
        }
      })()
    </script>

    <!-- iOS Safari "Add to Home Screen" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tickd" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
