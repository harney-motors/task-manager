[build]
  command = "npm run build"
  publish = "dist"

# Pretty URL for calendar subscriptions: /calendar/<token>.ics rewrites
# internally to the Netlify function. Must come BEFORE the SPA fallback
# so the function actually runs.
[[redirects]]
  from = "/calendar/:token.ics"
  to = "/.netlify/functions/calendar-feed?token=:token"
  status = 200

# SPA fallback: serve index.html for any path that isn't a real file,
# so client-side routes like /login don't 404 on direct hit or refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
